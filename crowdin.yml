project_id: 7
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."
base_url: "https://chia.crowdin.com"
preserve_hierarchy: true
files: [
    # Docs Markdown files
    {
      source: '/docs/**/*',
      translation: '/i18n/%osx_locale%/docusaurus-plugin-content-docs/current/**/%original_file_name%',
      skip_untranslated_strings: false
    },
  ]

# NOTE: Skip patterns for technical content should be configured in Crowdin web UI:
# Project Settings > Files > File Settings > Skip strings matching patterns
# Recommended patterns to skip:
# - ^import .* from (import statements)
# - ^``` (code blocks)
# - ^<[A-Z] (MDX component opening tags)
# - ^</[A-Z] (MDX component closing tags)
# - ^\[/.*\]\(/ (absolute file paths in links)
# - \{#.*\}$ (anchor IDs in headings)
# - import .* from .*@site/static (image imports)
